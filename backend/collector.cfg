# ==============================================================================
# MiniMAGUX Network Traffic Monitor Configuration File
# ==============================================================================
#
# 이 설정 파일은 C++ 패킷 수집기(collector)의 동작 방식을 제어합니다.
# 수정 후 수집기 데몬을 재시작해야 설정이 반영됩니다.
# (종료: sudo ./collector -kill  |  기동: sudo ./collector)
#

# ------------------------------------------------------------------------------
# 1. CSV 로그 저장 경로 설정 (CSV Storage Directory)
# ------------------------------------------------------------------------------
# 수집된 패킷 데이터가 시간별 CSV 파일로 저장될 절대 또는 상대 디렉토리 경로입니다.
# 폴더가 존재하지 않을 경우 수집기가 자동으로 폴더를 생성합니다.
#
# 기본값: ./csv_logs
#
csv_dir = ./csv_logs

# ------------------------------------------------------------------------------
# 2. 패킷 수집 대상 네트워크 카드 인터페이스 (Network Interface)
# ------------------------------------------------------------------------------
# 패킷을 캡처할 네트워크 카드(NIC) 디바이스 명칭입니다.
# - 예시: eth0, ens18, enp0s3 등
# - 리눅스 터미널에서 'ip link' 또는 'ip addr' 명령어로 실제 카드명을 확인하십시오.
# - 'any'로 지정할 경우 리눅스 OS는 Cooked Capture(SLL) 모드로 동작하여 
#   이더넷 헤더 파싱 오류가 날 수 있으므로 반드시 실제 디바이스명 매핑을 권장합니다.
#
# 기본값: enp0s3
#
interface = enp0s3

# ------------------------------------------------------------------------------
# 3. Manticore Search 엔진 실시간 연동 여부 (Database Integration)
# ------------------------------------------------------------------------------
# 수집된 패킷을 디스크(CSV) 외에 Manticore Search DB로 실시간 전송할지 여부입니다.
# - true : Manticore Search 데이터베이스에 실시간 적재 및 인덱싱 (웹 대시보드 필수)
# - false: 데이터베이스 연동 없이 로컬 CSV 파일만 남기는 단독 모드 (서버 자원 절약)
#
# 기본값: false (Manticore 미설치 시 false 권장)
#
use_manticore = false

# ------------------------------------------------------------------------------
# 4. Manticore Search 데이터베이스 접속 설정 (Database Connection Settings)
# ------------------------------------------------------------------------------
# Manticore Search가 구동 중인 서버의 IP 및 SQL 접속 포트 설정입니다.
# (use_manticore = true 일 경우에만 동작합니다.)
#
# manticore_host: Manticore 데몬 서버 IP (로컬일 경우 127.0.0.1)
# manticore_port: Manticore MySQL 프로토콜 포트 (기본값: 9306)
#
manticore_host = 127.0.0.1
manticore_port = 9306
