# Manticore Search Configuration for Network Traffic Monitor

searchd {
    listen = 9306:mysql41
    listen = 9308:http
    log = /var/log/manticore/searchd.log
    query_log = /var/log/manticore/query.log
    pid_file = /var/run/manticore/searchd.pid
    binlog_path = /var/lib/manticore/binlog
}

table packets {
    type = rt
    path = /var/lib/manticore/packets

    rt_attr_timestamp = timestamp
    rt_field = interface
    rt_attr_string = interface
    rt_field = src_mac
    rt_attr_string = src_mac
    rt_field = dst_mac
    rt_attr_string = dst_mac
    rt_attr_uint = eth_type
    rt_attr_uint = ip_ver
    rt_field = src_ip
    rt_attr_string = src_ip
    rt_field = dst_ip
    rt_attr_string = dst_ip
    rt_attr_uint = ip_ttl
    rt_attr_uint = ip_proto
    rt_attr_uint = src_port
    rt_attr_uint = dst_port
    rt_attr_bigint = tcp_seq
    rt_attr_bigint = tcp_ack
    rt_field = tcp_flags
    rt_attr_string = tcp_flags
    rt_attr_uint = tcp_win
    rt_attr_uint = udp_len
    rt_attr_uint = icmp_type
    rt_attr_uint = icmp_code
    rt_attr_uint = payload_len
}
